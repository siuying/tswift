[meta]
framework = "SwiftUI"
reference = "swiftc 6.3.2 / iPhoneSimulator SDK (iOS is the target platform)"
stance = """
Render-host semantics, not value semantics: types here are SwiftUI view/control/
container concepts the runtime evaluates into a host-neutral UIIR (see
docs/adr/0006-swiftui-render-host.md and docs/plan/swiftui-support.md). View
modifiers (.font/.padding/.foregroundColor/…) are measured as members of `View`.
Tiers mirror the plan roadmap: UI1 = v1 Counter slice, UI2 = the remaining demo
tabs, UI3–UI8 = the staged tiers, UI9 = animation. The headless host supports a
single App → Scene → WindowGroup entry and evaluates that WindowGroup's one root
View through the ordinary render session. Window lifecycle, multi-window,
platform-owned scenes, and commands remain out of scope with diagnostics.
"""

# NavigationPath is a prelude value type (crates/tswift-swiftui PRELUDE): its
# members are implemented in Swift, not the free-fn/modifier registry, so they
# never appear in registered_keys.txt. List the ones the runtime provides here
# (init(), append(_:), removeLast(_:), count, isEmpty — Codable/CodableRepresen-
# tation forms and `==` remain out of reach v1).
#
# AsyncImage: 4/5 inits implemented (bare url, content+placeholder, phase-closure,
# scale form NYI). AsyncImagePhase is a prelude struct (not the real SwiftUI enum);
# .success/.failure/.empty cases are accessible via .isSuccess/.isFailure/.isEmpty.
[core_members]
State = ["init", "projectedValue", "wrappedValue"]
App = ["main"]
# `Scene` is a protocol carrier for the host entry; the SDK inventory has no
# standalone Scene requirement to credit. Scene composition is limited to a
# single WindowGroup (optionally wrapped in Group/custom Scene values).
WindowGroup = ["init"]
# `Binding` supports `get:set:`, `constant`, failable optional unwrapping, and
# `$state` projection into child `@Binding` properties. Collection/subscript
# bindings (`$items[i]`, `ForEach($items)`) remain out of scope: the headless
# runtime has no element-identity/writeback contract for mutable collections.
Binding = ["init", "constant", "projectedValue", "wrappedValue"]
StateObject = ["init", "wrappedValue"]
ObservedObject = ["init", "wrappedValue"]
EnvironmentObject = ["init", "wrappedValue"]
Environment = ["init", "wrappedValue"]
NavigationPath = ["init", "append", "removeLast", "count", "isEmpty"]
AsyncImage = ["init", "init(url:content:placeholder:)", "init(url:transaction:content:)"]
# Text typography modifiers (Text -> Text) recorded via the shared modifier
# table. Weight/emphasis (bold/italic/underline/strikethrough), numeric spacing
# (kerning/tracking/baselineOffset), the monospacing toggles, and font/weight/
# foreground styling. fontDesign/fontWidth need Font.Design/Font.Width nested
# token types (frontend lacks nested-type static access) — out of scope v1.
Text = ["bold", "italic", "underline", "strikethrough", "kerning", "tracking", "baselineOffset", "monospaced", "monospacedDigit", "font", "fontWeight", "foregroundColor", "foregroundStyle", "accessibilityLabel"]
# Explicit RGB colors are prelude values and serialize to host-neutral RGBA;
# named system colors stay semantic tokens. `.opacity(_:)` adjusts alpha on
# either form. `.gradient`/`.mix`/`cgColor`/HDR resolution remain out of scope.
Color = ["init", "opacity", "primary", "secondary", "white", "black", "red", "orange", "yellow", "green", "mint", "teal", "cyan", "blue", "indigo", "purple", "pink", "brown", "gray", "clear", "accentColor"]
# Gesture value types (slice 7): init + onEnded lowering via .gesture(_:).
# DragGesture/streaming gestures remain out of scope (need async event channel).
TapGesture = ["init", "onEnded"]
LongPressGesture = ["init", "onEnded"]
# Animation & AnyTransition are prelude value types (crates/tswift-swiftui
# PRELUDE): factories + chainable methods are implemented in Swift, not the
# modifier registry, so they never appear in registered_keys.txt. List the
# implemented members here. `.default` and the custom curves (timingCurve/
# interpolatingSpring/interactiveSpring) are implemented; the velocity/animate/
# shouldMerge internals remain out of reach v1.
Animation = ["easeIn", "easeInOut", "easeOut", "linear", "spring", "bouncy", "smooth", "snappy", "delay", "speed", "repeatCount", "repeatForever", "default", "timingCurve", "interpolatingSpring", "interactiveSpring"]
# AnyTransition: opacity/identity/slide/scale + move/push/offset/scale(_:) +
# combined/asymmetric + `.animation(_:)`. The ViewModifier
# `modifier(active:identity:)` form remains out of scope.
AnyTransition = ["opacity", "identity", "slide", "scale", "move", "push", "offset", "combined", "asymmetric", "animation"]

# ── UI1 — v1 Counter slice (proves the whole loop end to end) ─────────────────
[[tier]]
id = "UI1"
title = "Counter slice: View protocol, @State, stacks, Text, Button"
types = ["View", "State", "Text", "Button", "VStack", "HStack", "Spacer"]

# ── UI2 — remaining demo tabs (Greeting / Stack / Profile) ────────────────────
[[tier]]
id = "UI2"
title = "Toggle + ternary, shapes + ZStack, view composition"
types = ["Toggle", "ZStack", "Color", "Circle", "RoundedRectangle", "Rectangle", "Capsule", "Ellipse"]

# ── UI3 — dynamic collections & identity (keyed diff + move patch) ────────────
[[tier]]
id = "UI3"
title = "ForEach / List / Section"
types = ["ForEach", "List", "Section"]

# ── UI4 — bindings & input controls (two-way data flow, focus) ────────────────
[[tier]]
id = "UI4"
title = "Binding + input controls"
types = ["Binding", "TextField", "SecureField", "Slider", "Stepper", "Picker"]

# ── UI5 — observation & shared model state (invalidation graph) ───────────────
[[tier]]
id = "UI5"
title = "Observation & environment"
types = ["StateObject", "ObservedObject", "EnvironmentObject", "Environment", "ObservableObject"]

# ── UI6 — task & async (blocked on language async, ADR-0005) ──────────────────
[[tier]]
id = "UI6"
title = "Async views (.task / .refreshable / progress)"
types = ["ProgressView", "AsyncImage"]

# ── UI7 — layout & geometry (GeometryReader round-trip inflection) ────────────
[[tier]]
id = "UI7"
title = "Layout & geometry"
types = ["ScrollView", "LazyVStack", "LazyHStack", "Grid", "LazyVGrid", "LazyHGrid", "GeometryReader", "GeometryProxy", "ViewThatFits"]

# ── UI8 — navigation & presentation (out-of-tree surfaces) ────────────────────
[[tier]]
id = "UI8"
title = "Navigation & presentation"
types = ["NavigationStack", "NavigationLink", "NavigationSplitView", "NavigationPath", "TabView", "Form", "Group"]

# UI9 — animation (implicit .animation, .transition, withAnimation)
[[tier]]
id = "UI9"
title = "Animation & transitions"
types = ["Animation", "AnyTransition"]

# UI10 — host-owned application entry (one headless window)
[[tier]]
id = "UI10"
title = "Headless App / Scene / WindowGroup entry"
types = ["App", "Scene", "WindowGroup"]

# ── Explicitly excluded (keeps the denominator honest) ────────────────────────
[out_of_scope]
animation = ["Namespace", "MatchedGeometryEffect", "PhaseAnimator", "KeyframeAnimator"]
gestures = ["DragGesture", "MagnificationGesture", "RotationGesture", "GestureState", "SpatialEventGesture"]
graphics = ["Canvas", "Path", "GraphicsContext", "Gradient", "LinearGradient", "RadialGradient", "AngularGradient", "Image", "Shadow"]
platform_interop = ["UIViewRepresentable", "NSViewRepresentable", "UIViewControllerRepresentable", "UIHostingController", "NSHostingController"]
app_scene_lifecycle = ["Settings", "DocumentGroup", "MenuBarExtra", "Commands", "Window", "ImmersiveSpace", "MenuBarExtraStyle"]
binding_collections = ["Binding.subscript", "Binding.init(projecting:)", "ForEach.init(_:content:) binding overload"]

# `.toolbar { ... }` records and renders its builder content as a nested UIIR
# modifier value, but that representation has no host-routable structural ids.
# Toolbar button actions are therefore explicitly unsupported until toolbar
# content becomes an event-addressable UIIR subtree.
[out_of_scope_members]
toolbar_actions = ["View.toolbar"]
closure_callback_semantics = [
  "View.transaction", "View.visualEffect", "View.transformEnvironment",
  "View.scrollTransition", "View.onGeometryChange", "View.onScrollGeometryChange",
  "View.onScrollPhaseChange", "View.onScrollVisibilityChange",
  "View.onPreferenceChange", "View.onModifierKeysChanged",
  "View.transformPreference", "View.phaseAnimator", "View.onCommand",
  "View.onPasteCommand", "View.renameAction", "View.onKeyPress",
  "View.onContinueUserActivity", "View.onScrollTargetVisibilityChange",
  "View.onDrop", "View.onDragSessionUpdated", "View.onDropSessionUpdated",
  "View.onInteractiveResizeChange", "View.onLongTouchGesture",
  "View.onVolumeViewpointChange", "View.onWorldRecenter",
  "View.accessibilityAction", "View.accessibilityAdjustableAction",
  "View.accessibilityScrollAction", "View.accessibilityZoomAction",
  "View.dropDestination", "View.copyable", "View.cuttable",
  "View.pasteDestination", "View.itemProvider", "View.userActivity",
  "View.exportsItemProviders", "View.importsItemProviders",
  "View.fileExporter", "View.fileImporter", "View.fileMover",
  "View.dismissalConfirmationDialog", "View.digitalCrownRotation",
  "View.backgroundPreferenceValue", "View.overlayPreferenceValue",
]
