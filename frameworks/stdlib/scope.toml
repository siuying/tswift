[meta]
framework = "Swift"
reference = "swiftc 6.3.2 / Swift.swiftinterface"
stance = "capability-driven stdlib denominator; legacy targeted sections remain registry-driven"

[coverage]
sequence_types = [
  "Array",
  "ArraySlice",
  "ContiguousArray",
  "Set",
  "Dictionary",
  "String",
  "Substring",
  "Range",
  "ClosedRange",
  "CollectionOfOne",
  "EmptyCollection",
  "ReversedCollection",
]

[core_members]
Array = ["+", "+=", "=="]
# Floating-point type constants resolved directly by the interpreter
# (interp/storage.rs `double_type_constant`), not via the method registry.
Double = [
  "pi",
  "infinity",
  "nan",
  "greatestFiniteMagnitude",
  "leastNonzeroMagnitude",
  "leastNormalMagnitude",
  "ulpOfOne",
]
