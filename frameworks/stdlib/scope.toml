[meta]
framework = "Swift"
reference = "swiftc 6.3.2 / Swift.swiftinterface"
stance = "capability-driven stdlib denominator; legacy targeted sections remain registry-driven"

[coverage]
sequence_types = [
  "Array",
  "ArraySlice",
  "ContiguousArray",
  "Set",
  "Dictionary",
  "String",
  "Substring",
  "Range",
  "ClosedRange",
  "CollectionOfOne",
  "EmptyCollection",
  "ReversedCollection",
]

# Operators are evaluated directly by the interpreter (tswift-core `ops.rs`),
# not the method registry. Only the `+`, `+=`, `==` tokens the fixture scanner
# recognises are listed here, against the types whose `ops.rs` arms implement
# them: arithmetic/concatenation `+`/`+=` for Int/Double/String, and `==` for
# the value collections (Set/Dictionary/Range equality added in ops.rs).
[core_members]
Array = ["+", "+=", "=="]
Int = ["+", "+=", "=="]
String = ["+", "+=", "=="]
Set = ["=="]
Dictionary = ["=="]
Range = ["=="]
# Floating-point type constants resolved directly by the interpreter
# (interp/storage.rs `double_type_constant`), plus the `+`/`+=`/`==` operators
# from `ops.rs`. Neither path goes through the method registry.
Double = [
  "pi",
  "infinity",
  "nan",
  "greatestFiniteMagnitude",
  "leastNonzeroMagnitude",
  "leastNormalMagnitude",
  "ulpOfOne",
  "+",
  "+=",
  "==",
]
