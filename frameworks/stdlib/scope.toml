[meta]
framework = "Swift"
reference = "swiftc 6.3.2 / Swift.swiftinterface"
stance = "capability-driven stdlib denominator; legacy targeted sections remain registry-driven"

[coverage]
sequence_types = [
  "Sequence",
  "Array",
  "ArraySlice",
  "ContiguousArray",
  "Set",
  "Dictionary",
  "String",
  "Substring",
  "Range",
  "ClosedRange",
  "CollectionOfOne",
  "EmptyCollection",
  "ReversedCollection",
]

# These StringProtocol/Collection members are inherited rather than repeated in
# the concrete String and Substring interface sections. Track the concrete
# runtime capability nevertheless: their result indices must stay in each
# receiver's String.Index coordinate space, so generic sequence coverage is
# not sufficient evidence.
[coverage.inherited_members]
String = ["firstIndex", "lastIndex", "prefix", "suffix", "range"]
Substring = ["firstIndex", "lastIndex", "prefix", "suffix", "range"]

# Operators are evaluated directly by the interpreter (tswift-core `ops.rs`),
# not the method registry. Only the `+`, `+=`, `==` tokens the fixture scanner
# recognises are listed here, against the types whose `ops.rs` arms implement
# them: arithmetic/concatenation `+`/`+=` for Int/Double/String, and `==` for
# the value collections (Set/Dictionary/Range equality added in ops.rs).
[core_members]
# Items listed here are handled directly by the interpreter (subscript/init via
# the builtin-ctor/dispatch machinery, encode via JSONEncoder.json_encode,
# ! via ops.rs unary prefix) and therefore never appear in registered_keys.txt.
# They count as both "implemented" and — when the token already appears in a
# stdlib_*.swift fixture — "verified" for coverage reporting purposes.
Array = ["+", "+=", "==", "subscript", "init", "encode"]
ArraySlice = ["==", "subscript", "init"]
ContiguousArray = ["==", "subscript", "init", "encode"]
Int = [
  "+", "+=", "-", "-=", "*", "*=", "/", "/=", "%", "%=",
  "==", "!=", "<", "<=", ">", ">=",
  "&", "&=", "|", "|=", "^", "^=", "&<<", "&>>", "&<<=", "&>>=",
]
String = ["+", "+=", "==", "<", "init", "subscript", "~="]
Substring = ["init", "subscript", "~="]
Bool = ["&&", "||", "==", "!", "init", "encode"]
Set = ["=="]
Dictionary = ["==", "subscript", "init", "encode"]
Range = ["=="]
ClosedRange = ["==", "<"]
ReversedCollection = ["==", "<"]
EmptyCollection = ["=="]
CollectionOfOne = ["init", "subscript"]
Optional = ["==", "!=", "unsafelyUnwrapped", "hashValue", "init", "some", "none", "encode"]
# Floating-point type constants resolved directly by the interpreter
# (interp/storage.rs `double_type_constant`), plus the `+`/`+=`/`==` operators
# from `ops.rs`. Neither path goes through the method registry.
Double = [
  "pi",
  "infinity",
  "nan",
  "quietNaN",
  "signalingNaN",
  "greatestFiniteMagnitude",
  "leastNonzeroMagnitude",
  "leastNormalMagnitude",
  "ulpOfOne",
  "exponentBitCount",
  "significandBitCount",
  "+", "+=", "-", "-=", "*", "*=", "/", "/=", "==",
]
