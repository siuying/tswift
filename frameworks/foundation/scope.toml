[meta]
framework = "Foundation"
reference = "swiftc 6.3.2 / MacOSX SDK"
stance = "mirror swift-corelibs-foundation semantics; document Darwin gaps"

[[tier]]
id = "F1"
title = "Value primitives"
types = ["Data", "UUID", "IndexPath", "IndexSet"]

[[tier]]
id = "F2"
title = "URL + components"
types = ["URL", "URLComponents", "URLQueryItem"]

[[tier]]
id = "F3"
title = "Date & time"
types = ["Date", "TimeInterval", "Calendar", "DateComponents", "DateFormatter", "ISO8601DateFormatter"]

[[tier]]
id = "F4"
title = "Numbers & formatting"
types = ["Decimal", "NumberFormatter", "Measurement"]

[[tier]]
id = "F5"
title = "Coding"
types = ["JSONEncoder", "JSONDecoder", "PropertyListEncoder"]

[[tier]]
id = "F6"
title = "Networking"
types = ["URLRequest", "URLError", "URLSession"]

[[tier]]
id = "F7"
title = "Persistence"
types = ["UserDefaults", "FileManager"]

[core_members]
Date = ["+", "+=", "-", "-=", "<", "==", ">"]
Decimal = ["+", "+=", "-", "-=", "*", "*=", "/", "/=", "==", "<"]
DateComponents = ["==", "!="]
Calendar = ["==", "!="]
IndexPath = ["<", "<=", ">", ">=", "==", "!="]
Measurement = ["+", "-", "*", "/", "==", "<"]
Data = ["=="]
UUID = ["=="]
URL = ["=="]
URLQueryItem = ["=="]
URLComponents = ["=="]

# Darwin gaps (documented, intentional for now):
# - Calendar/DateComponents/DateFormatter/ISO8601DateFormatter operate in the
#   proleptic Gregorian calendar in UTC and ignore Locale/TimeZone. Formatter
#   names are hard-coded en_US. Date arithmetic and parsing are exact; locale-
#   and zone-sensitive behaviour is not modelled.
# - DateFormatter/ISO8601DateFormatter are ObjC classes absent from the
#   generated `.swiftinterface` inventory, so they do not appear in coverage
#   roll-ups even though they are implemented and golden-tested.
# - URLResponse/HTTPURLResponse/URLSessionConfiguration are likewise ObjC
#   classes absent from the inventory; implemented and golden-tested
#   (foundation_urlrequest / foundation_urlsession fixtures).
# - URLSession F6 (M3–M7): URLSessionDataTask (cancel/resume/state/progress/
#   bytesReceived/bytesExpected), dataTask(with:completionHandler:), and the
#   three delegate protocols (URLSessionDelegate, URLSessionTaskDelegate,
#   URLSessionDataDelegate) are **modelled** — backed by the tswift_core::http
#   event-transport seam (mock/ureq/ffi/wasm).
# - Bytes- and download-based members (bytes(for:), downloadTask) are NOT
#   modelled; publisher-based members (dataTaskPublisher) are NOT modelled.
# - Wasm degraded tier: the wasm tswiftHttp hook completes the fetch
#   synchronously before events are dispatched; cancellation stops event
#   delivery only — it cannot abort a fetch already returned.
# - URLSessionDataTask is backed by SwiftValue::Struct (not a class instance).
#   Scripts MUST bind tasks to `var`, not `let`; aliases do not observe
#   resume()/cancel() mutations (value-semantics divergence from Foundation).
# - UserDefaults (F7) is backed by the `tswift.defaults` host service
#   (tswift_core::host_services) rather than real Darwin CFPreferences;
#   availability depends on the embedding (CLI native = in-process store,
#   opt-in file persistence via TSWIFT_DEFAULTS_FILE; wasm = localStorage;
#   iOS = real UserDefaults via a host-fn shim). Only Bool/Int/Double/String/
#   [String] are storable; other property-list shapes (nested containers,
#   Data, Date) are NOT modelled. dictionaryRepresentation(), register(
#   defaults:), synchronize(), suites, and KVO/NotificationCenter integration
#   are NOT implemented. An unavailable host service raises a Swift-catchable
#   "unavailable on this platform" diagnostic rather than crashing.
# - FileManager (F7) is backed by the `tswift.fs` host service
#   (tswift_core::host_services) rather than real Darwin filesystem APIs
#   directly; availability depends on the embedding (CLI native = the real,
#   unrooted filesystem; wasm/iOS host-fn shims land in a later slice).
#   Binary content crosses the host wire as base64 String. `.default` is
#   Object-backed (===, `let` legal, no per-instance state). Implemented:
#   fileExists(atPath:), contents(atPath:), contentsOfDirectory(atPath:),
#   createDirectory(atPath:withIntermediateDirectories:),
#   removeItem(atPath:), createFile(atPath:contents:),
#   copyItem/moveItem(atPath:toPath:); plus the file-URL-loading helpers
#   String(contentsOfFile:)/String(contentsOf:), Data(contentsOf:), and
#   String/Data write(to:)/write(toFile:). NOT implemented:
#   fileExists(atPath:isDirectory:) (the `inout Bool` overload — this
#   runtime does not thread `inout` through method calls), file attributes
#   (`attributes:` arguments are accepted and ignored), symlinks/permissions/
#   extended attributes, FileHandle, and non-`file:` URL loading (throws
#   rather than fetching). Thrown errors surface as a simplified `HostError`
#   struct (`message: String`) rather than `CocoaError`/`NSError`
#   (domain/code/userInfo are not modelled) — documented in
#   tswift-foundation::file_manager.
[notes]
calendar_locale = "Gregorian/UTC only; en_US names; no Locale/TimeZone"
decimal_precision = "i128 mantissa + i32 exponent; narrower than Darwin's 38-digit Decimal; division keeps up to 30 guard digits"
decimal_special_values = "Decimal has no infinity or negative zero: isInfinite is always false, isFinite is !isNaN. nan.significand/exponent propagate NaN. greatestFiniteMagnitude and ulp are not modelled."
numberformatter_locale = "fixed en_US: ',' grouping, '.' decimal, '$' currency; no Locale. ObjC class absent from inventory."
urlsession_transport = "URLSession runs on the embedding's transport: mock (fixtures), ureq HTTPS (CLI --allow-network), host handler (ffi), tswiftHttp hook (wasm); no cache/cookies/redirect policy modelled"
urlsession_delegates = "URLSessionDataDelegate/TaskDelegate callbacks modelled (M3/M4); URLSessionDataTask.cancel/resume/state/progress modelled; bytes/download/publisher members unmodelled"
urlsession_wasm_tier = "wasm: fetch completes eagerly; delegate+progress replay faithfully; cancel stops delivery only (cannot abort completed fetch)"
urlsession_task_semantics = "URLSessionDataTask, URLSession, URLSessionConfiguration, DateFormatter, ISO8601DateFormatter, NumberFormatter, JSONEncoder, JSONDecoder, PropertyListEncoder are Object-backed (SwiftValue::Object, reference semantics); `let` bindings legal; aliases observe mutations; `===` identity holds. See ADR-0012."
userdefaults_host_service = "UserDefaults.standard is Object-backed (===, `let` legal); its methods cross the tswift.defaults host-service namespace (set/get/remove, JSON-encoded values); type coercions on the typed getters (bool/integer/double(forKey:)) approximate NSNumber/NSString bridging, documented in tswift-foundation::user_defaults"

[out_of_scope]
filesystem = ["FileHandle"]
networking = ["Host"]
objc_runtime = ["NSObject", "NSCoding", "Bundle"]
distributed = ["NSXPCConnection", "NSUserActivity"]
