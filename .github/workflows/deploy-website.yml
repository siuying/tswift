name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  # Allow a manual trigger from the Actions UI
  workflow_dispatch:

# Required for GitHub Pages OIDC token
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run for the same branch
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build (Astro → dist/)
        run: npm run build
        working-directory: website
        env:
          # Astro reads these to set <base href> and resolve asset paths.
          # Update SITE_URL if the repo is ever renamed or moved to an org.
          SITE_URL: https://siuying.github.io/simple-swift
          BASE_PATH: /simple-swift

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
