name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with msf submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install libclang (for bindgen)
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  website-wasm-smoke:
    name: website wasm smoke (SwiftUI host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Asserts the committed production wasm (public/wasm) still exports the
      # SwiftUI host entry points the playground preview drives. A stale,
      # runSwift-only wasm would silently break the live preview.
      - name: SwiftUI wasm smoke
        run: node test/wasm-smoke.mjs
        working-directory: website

  ios-playground-build:
    name: iOS playground build (demo, non-gating)
    runs-on: macos-26
    # The app is a product demo, never the regression gate (the signal stays in
    # the TSwiftUI / UiirRenderer tests). A red build here flags drift without
    # blocking the merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # xcodegen emits the current project format (objectVersion 77); open it
      # with the latest stable Xcode (older toolchains can't read it).
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate
        working-directory: apps/TSwiftPlayground

      # Resolves Runestone + the pinned TSwiftFFI.xcframework (ffi.pin) and
      # builds for the simulator.
      - name: Build (iOS Simulator)
        run: |
          xcodebuild build \
            -project TSwiftPlayground.xcodeproj \
            -scheme TSwiftPlayground \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
        working-directory: apps/TSwiftPlayground
