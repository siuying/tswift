name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with msf submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install libclang (for bindgen)
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  website-wasm-smoke:
    name: website wasm smoke (SwiftUI host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Asserts the committed production wasm (public/wasm) still exports the
      # SwiftUI host entry points the playground preview drives. A stale,
      # runSwift-only wasm would silently break the live preview.
      - name: SwiftUI wasm smoke
        run: node test/wasm-smoke.mjs
        working-directory: website
