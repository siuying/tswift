name: Release xcframework

# Build the TSwiftFFI.xcframework from crates/tswift-ffi and publish it as a
# GitHub Release asset (TSwiftFFI.xcframework.zip), then open a PR that updates
# the committed pin (ios/TSwift/ffi.pin) so SwiftPM resolves the new release.
#
# See docs/plan/native-host.md and ADR-0008 (xcframework distribution). This is
# the CI counterpart of scripts/publish-xcframework.sh — the Apple cross slices
# (device + simulator + macOS) require an Xcode/macOS runner.
on:
  # A `ffi-v*` tag push releases that exact version.
  push:
    tags:
      - "ffi-v*"
  # Manual runs (Actions tab). With no tag, the script mints a ffi-v<date> tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. ffi-v1). Leave blank to mint ffi-v<timestamp>."
        required: false
        type: string
      update_pin:
        description: "Open a PR updating ios/TSwift/ffi.pin to the new release."
        required: false
        default: true
        type: boolean
  # Reusable: auto-release-xcframework.yml calls this when crates/tswift-ffi/**
  # changes land on main (mints a ffi-v<timestamp> tag and opens the pin PR).
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Build & publish TSwiftFFI.xcframework
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      # The tag to release: explicit input, else the pushed tag, else empty
      # (publish-xcframework.sh mints a ffi-v<timestamp> tag when blank).
      RELEASE_TAG: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios,
            aarch64-apple-darwin,
            x86_64-apple-darwin

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-xcframework-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build xcframework
        run: ./scripts/build-xcframework.sh

      - name: Publish release + update pin
        id: publish
        run: |
          set -euo pipefail
          args=()
          if [[ -n "${RELEASE_TAG}" ]]; then
            args+=(--tag "${RELEASE_TAG}")
          fi
          ./scripts/publish-xcframework.sh "${args[@]}"
          # Surface the resolved tag (the script may have minted one) for later steps.
          resolved="$(grep -o '"version": *"[^"]*"' ios/TSwift/ffi.pin | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')"
          echo "tag=${resolved}" >> "$GITHUB_OUTPUT"

      - name: Open PR to update ffi.pin
        # Default true; skipped only when explicitly disabled on a manual run.
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.update_pin != 'false' }}
        env:
          TAG: ${{ steps.publish.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- ios/TSwift/ffi.pin; then
            echo "ffi.pin unchanged; nothing to open a PR for."
            exit 0
          fi
          branch="chore/ffi-pin-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add ios/TSwift/ffi.pin
          git commit -m "chore(ffi): pin TSwiftFFI ${TAG}"
          git push --force-with-lease origin "${branch}"
          gh pr create \
            --base main \
            --head "${branch}" \
            --title "chore(ffi): pin TSwiftFFI ${TAG}" \
            --body "Automated pin bump for the published TSwiftFFI.xcframework (\`${TAG}\`).

          Generated by the *Release xcframework* workflow."
