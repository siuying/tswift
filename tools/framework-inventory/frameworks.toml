# Framework descriptors for API inventory and coverage tooling.
# Paths are resolved by tools/framework-inventory/extract.py.

[stdlib]
display_name = "Swift stdlib"
module = "Swift"
kind = "toolchain"
toolchain = "swift-6.3.2-RELEASE"
relative_path = "usr/lib/swift/macosx/Swift.swiftmodule"
interface_candidates = [
  "arm64-apple-macos.swiftinterface",
  "x86_64-apple-macos.swiftinterface",
]
inventory = "docs/swift-runtime/stdlib-inventory.md"
registry = "frameworks/stdlib/registered_keys.txt"
scope = "frameworks/stdlib/scope.toml"
fixture_prefix = "stdlib_"

[swiftdata]
display_name = "SwiftData"
module = "SwiftData"
kind = "sdk-framework"
framework_path = "System/Library/Frameworks/SwiftData.framework/Versions/A/Modules/SwiftData.swiftmodule"
# @Query (the SwiftUI-facing property wrapper/macro) lives in the separate
# _SwiftData_SwiftUI module, not SwiftData itself. Merge both, mirroring the
# swiftui/SwiftUICore split above.
additional_framework_paths = [
  "System/Library/Frameworks/_SwiftData_SwiftUI.framework/Versions/A/Modules/_SwiftData_SwiftUI.swiftmodule",
]
interface_candidates = [
  "arm64e-apple-macos.swiftinterface",
  "arm64-apple-macos.swiftinterface",
  "x86_64-apple-macos.swiftinterface",
]
inventory = "frameworks/swiftdata/inventory.md"
registry = "frameworks/swiftdata/registered_keys.txt"
scope = "frameworks/swiftdata/scope.toml"
fixture_prefix = "swiftdata_"

[foundation]
display_name = "Foundation"
module = "Foundation"
kind = "sdk-framework"
framework_path = "System/Library/Frameworks/Foundation.framework/Versions/Current/Modules/Foundation.swiftmodule"
interface_candidates = [
  "arm64e-apple-macos.swiftinterface",
  "arm64-apple-macos.swiftinterface",
  "x86_64-apple-macos.swiftinterface",
]
inventory = "frameworks/foundation/inventory.md"
registry = "frameworks/foundation/registered_keys.txt"
scope = "frameworks/foundation/scope.toml"
fixture_prefix = "foundation_"

[swiftui]
display_name = "SwiftUI"
module = "SwiftUI"
kind = "sdk-framework"
# iOS is the target: resolve the SwiftUI surface from the iOS Simulator SDK,
# not macOS. iOS framework bundles are not versioned (no Versions/Current).
sdk = "iphonesimulator"
framework_path = "System/Library/Frameworks/SwiftUI.framework/Modules/SwiftUI.swiftmodule"
# SwiftUI @_exported import SwiftUICore: the layout primitives (VStack/HStack/
# ZStack/Spacer/Color/Text/Binding/State/View) live in SwiftUICore. Merge both.
additional_framework_paths = [
  "System/Library/Frameworks/SwiftUICore.framework/Modules/SwiftUICore.swiftmodule",
]
interface_candidates = [
  "arm64-apple-ios-simulator.swiftinterface",
  "x86_64-apple-ios-simulator.swiftinterface",
]
inventory = "frameworks/swiftui/inventory.md"
registry = "frameworks/swiftui/registered_keys.txt"
scope = "frameworks/swiftui/scope.toml"
fixture_prefix = "swiftui_"
fixture_dir = "tests/swiftui-fixtures"

[charts]
display_name = "Charts"
module = "Charts"
kind = "sdk-framework"
# iOS is the target: resolve the Charts surface from the iOS Simulator SDK,
# not macOS. iOS framework bundles are not versioned (no Versions/Current).
sdk = "iphonesimulator"
framework_path = "System/Library/Frameworks/Charts.framework/Modules/Charts.swiftmodule"
interface_candidates = [
  "arm64-apple-ios-simulator.swiftinterface",
  "x86_64-apple-ios-simulator.swiftinterface",
]
inventory = "frameworks/charts/inventory.md"
registry = "frameworks/charts/registered_keys.txt"
scope = "frameworks/charts/scope.toml"
fixture_prefix = "charts_"
fixture_dir = "tests/swiftui-fixtures"

[eventkit]
display_name = "EventKit"
module = "EventKit"
# EventKit is an Objective-C framework: its `.swiftinterface` is nearly empty
# (only Swift-native additions like EventStoreChanged), while the real API is
# bridged from Clang headers by the importer. Extract the faithful Swift-
# imported surface via `swift-symbolgraph-extract` instead of the interface.
kind = "objc-framework"
sdk = "iphonesimulator"
inventory = "frameworks/eventkit/inventory.md"
registry = "frameworks/eventkit/registered_keys.txt"
scope = "frameworks/eventkit/scope.toml"
fixture_prefix = "eventkit_"
