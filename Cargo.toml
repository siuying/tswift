[workspace]
resolver = "2"
members = [
    "crates/qswift-lexer",
    "crates/qswift-ast",
    "crates/qswift-parser",
    "crates/qswift-sema",
    "crates/qswift-frontend",
    "crates/qswift-core",
    "crates/qswift-std",
    "crates/qswift-cli",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/siuying/quick-swift"

[workspace.dependencies]
qswift-frontend = { path = "crates/qswift-frontend" }
qswift-core = { path = "crates/qswift-core" }
qswift-std = { path = "crates/qswift-std" }
