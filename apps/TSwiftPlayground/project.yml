name: TSwiftPlayground
options:
  bundleIdPrefix: dev.tswift
  deploymentTarget:
    iOS: "16.0"
packages:
  # The runtime bridge (PreviewSession over tswift-ffi) + the patch applier.
  TSwift:
    path: ../../ios/TSwift
  UiirRenderer:
    path: ../../ios/UiirRenderer
  # Runestone: the code editor. Pinned to a released tag (offline rule is
  # crates.io-only; SwiftPM UI deps are fetched like the pinned xcframework).
  Runestone:
    url: https://github.com/simonbs/Runestone
    exactVersion: "0.5.2"
  # The tree-sitter Swift grammar (parser.c + scanner.c) that drives Runestone's
  # syntax highlighting. Pinned to the tag that commits the generated parser so
  # no tree-sitter CLI is needed at build time.
  TreeSitterSwift:
    url: https://github.com/alex-pinkus/tree-sitter-swift
    revision: 31d17fe7e818a2048c808b5c6fdc2dc792f4f5b5 # 0.7.3-with-generated-files
targets:
  TSwiftPlayground:
    type: application
    platform: iOS
    sources: [Sources, Resources]
    dependencies:
      - package: TSwift
        product: TSwiftCore
      - package: TSwift
        product: TSwiftUI
      - package: UiirRenderer
        product: UiirRenderer
      - package: Runestone
        product: Runestone
      - package: TreeSitterSwift
        product: TreeSitterSwift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.tswift.playground
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: TSwift Studio
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
  # Unit tests for the pure project store (file CRUD + persistence). Hosted by
  # the app target so `@testable import TSwiftPlayground` reaches its models.
  TSwiftPlaygroundTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: TSwiftPlayground
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.tswift.playgroundTests
        SWIFT_VERSION: "6.0"
schemes:
  TSwiftPlayground:
    build:
      targets:
        TSwiftPlayground: all
        TSwiftPlaygroundTests: [test]
    test:
      targets:
        - TSwiftPlaygroundTests
